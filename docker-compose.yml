version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: pharma-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: pharma_distribution
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pharma-phpmyadmin
    restart: always
    ports:
      - "3307:3306"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: 123456

volumes:
  mysql_data: