name: Build and deploy Node.js app to Azure Web App - pharma-distribution-sko13

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install Server Dependencies
        run: |
          cd Server
          npm install

      - name: Install Client and Build
        run: |
          cd Client
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: Server

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_487958E1505347829E7BC3373E608480 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_060689A6A5524765A5FF2365DBF4EE13 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_25935E1B2F5747D4B51D71C0D50EFC4C }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: pharma-distribution-sko13
          slot-name: Production
          package: .
